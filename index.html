<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Puerto Rico — Trip Map (May 30–Jun 1)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!--
✅ Features included:
- Desktop + mobile auto-detection
- Swipeable bottom sheets (Stops + Details)
- Selected stop always centered in visible map area
- Re-center when sheets open/close
- 🔎 Full map always shows ALL trip stops
- Google Maps + Apple Maps buttons
-->

<style>
/* ---------- CORE STYLES ---------- */
:root{--sun:#FFD93D;--coral:#FF6B6B;--ink:#102028;--muted:#5c7680;}
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto}
#wrap{display:grid;grid-template-columns:390px 1fr;height:100%}
#sidebar{background:#fff;border-right:4px solid var(--sun);overflow:auto}
#map{height:100%}

/* ---------- HEADER ---------- */
header{padding:14px 16px 10px;border-bottom:1px solid #eee}
header h1{margin:0;font-size:18px}
header p{margin:6px 0 0;color:var(--muted);font-size:12px;font-weight:700;line-height:1.35}

/* ---------- DAY TABS ---------- */
.day-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff;z-index:5}
.day-btn{font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:7px 10px;border-radius:999px;border:2px solid #e6e6e6;background:#fff;color:#567;cursor:pointer}
.day-btn.on{border-color:var(--ink);background:var(--ink);color:#fff}
.plan-sub{padding:10px 16px 0;color:var(--muted);font-weight:800;font-size:12px}

/* ---------- LIST ---------- */
.list{padding:10px}
.item{display:flex;gap:10px;border:1px solid #eee;border-radius:12px;padding:10px;margin-bottom:8px;cursor:pointer}
.item:hover{background:#f7fbff}
.item.selected{outline:3px solid rgba(0,0,0,.08)}
.num{width:32px;height:32px;min-width:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;border:3px solid #fff;box-shadow:0 6px 14px rgba(0,0,0,.18)}
.name{font-weight:900;font-size:13px;color:var(--ink)}
.tag{font-size:12px;color:var(--muted);font-weight:700;margin-top:3px}

/* ---------- MARKERS ---------- */
.mk{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;border:3px solid #fff;box-shadow:0 6px 16px rgba(0,0,0,.25)}
.mk.sel{outline:4px solid rgba(255,217,61,.95)}

/* ---------- DRAWER ---------- */
#detail{position:fixed;top:0;right:0;width:410px;height:100%;background:#fff;transform:translateX(100%);
transition:transform .35s ease;box-shadow:-10px 0 30px rgba(0,0,0,.25);z-index:999;overflow:auto}
#detail.open{transform:translateX(0)}
#close-detail{position:absolute;top:12px;right:12px;background:var(--coral);color:#fff;border:none;width:34px;height:34px;border-radius:50%;font-weight:900;cursor:pointer}

/* ---------- MOBILE MODE ---------- */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.2s;z-index:850}
#overlay.show{opacity:1;pointer-events:auto}

.mobile-fab{position:fixed;bottom:16px;left:16px;z-index:1001;padding:12px 16px;border-radius:999px;border:none;background:var(--ink);color:#fff;font-weight:900}
.mobile-fab.alt{left:auto;right:16px}

.sheet-handle{width:42px;height:5px;border-radius:999px;background:#d8dde3;margin:10px auto 6px}

@media (max-width:820px){
  #wrap{grid-template-columns:1fr}
  #map{height:100svh}
  #sidebar,#detail{
    position:fixed;left:0;right:0;bottom:0;
    transform:translateY(100%);
    border-radius:16px 16px 0 0;
    box-shadow:0 -10px 30px rgba(0,0,0,.25)
  }
  #sidebar.open,#detail.open{transform:translateY(0)}
}
@media (min-width:821px){.mobile-fab{display:none}}
</style>
</head>

<body>
<div id="overlay"></div>

<div id="wrap">
  <div id="sidebar">
    <div class="sheet-handle"></div>
    <header>
      <h1>Puerto Rico — Trip Map</h1>
      <p>Tap a stop to open details. Numbers = visit order.</p>
    </header>
    <div class="day-tabs" id="dayTabs"></div>
    <div class="plan-sub" id="planSubtitle"></div>
    <div class="list" id="list"></div>
  </div>
  <div id="map"></div>
</div>

<div id="detail">
  <div class="sheet-handle"></div>
  <button id="close-detail">✕</button>
  <div id="detail-content"></div>
</div>

<button id="fabStops" class="mobile-fab">📍 Stops</button>
<button id="fabFull" class="mobile-fab alt">🔎 Full map</button>

<!-- JS is unchanged from the downloadable version -->
</body>
</html>
