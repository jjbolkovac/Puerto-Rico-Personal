<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Puerto Rico — Trip Map (May 30–Jun 1)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{--sun:#FFD93D;--coral:#FF6B6B;--ink:#102028;--muted:#5c7680;}
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto}
#wrap{display:grid;grid-template-columns:380px 1fr;height:100%}
#sidebar{background:#fff;border-right:4px solid var(--sun);overflow:auto}
#map{height:100%}

header{padding:14px 16px;border-bottom:1px solid #eee}
header h1{margin:0;font-size:18px}
header p{margin:6px 0 0;color:var(--muted);font-size:12px;font-weight:700}

.day-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff;z-index:5}
.day-btn{font-size:11px;font-weight:900;text-transform:uppercase;padding:7px 10px;border-radius:999px;border:2px solid #e6e6e6;background:#fff;cursor:pointer}
.day-btn.on{background:#102028;color:#fff;border-color:#102028}

.plan-sub{padding:10px 16px 0;color:var(--muted);font-weight:800;font-size:12px}

.list{padding:10px}
.item{display:flex;gap:10px;border:1px solid #eee;border-radius:12px;padding:10px;margin-bottom:8px;cursor:pointer}
.item:hover{background:#f7fbff}
.item.selected{outline:3px solid rgba(0,0,0,.08)}

.num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
font-weight:900;color:#fff;border:3px solid #fff;box-shadow:0 6px 14px rgba(0,0,0,.18)}

.mk{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
font-weight:900;color:#fff;border:3px solid #fff;box-shadow:0 6px 16px rgba(0,0,0,.25)}
.mk.sel{outline:4px solid rgba(255,217,61,.95)}

@keyframes bounce{0%{transform:translateY(0)}30%{transform:translateY(-16px)}50%{transform:translateY(0)}}
.mk.bounce{animation:bounce .6s ease}

#detail{position:fixed;top:0;right:0;width:410px;height:100%;background:#fff;transform:translateX(100%);
transition:transform .35s ease;box-shadow:-10px 0 30px rgba(0,0,0,.25);z-index:999}
#detail.open{transform:translateX(0)}
#close-detail{position:absolute;top:12px;right:12px;background:#FF6B6B;color:#fff;border:none;
width:34px;height:34px;border-radius:50%;font-weight:900;cursor:pointer}
</style>
</head>

<body>
<div id="wrap">
  <div id="sidebar">
    <header>
      <h1>Puerto Rico — Trip Map</h1>
      <p>Numbered exactly in the order you’ll hit them.<br>
      🛌 May 30: Punta Borinquen • 🛌 May 31: El Combate • ⏰ Jun 1: Ferry by 3:00 PM</p>
    </header>
    <div class="day-tabs" id="dayTabs"></div>
    <div class="plan-sub" id="planSubtitle"></div>
    <div class="list" id="list"></div>
  </div>
  <div id="map"></div>
</div>

<div id="detail">
  <button id="close-detail">✕</button>
  <div id="detail-content"></div>
</div>

<script>
/* ---------- DATA ---------- */

const STOPS = [
  {id:1,name:"Cueva del Indio",lat:18.492778,lng:-66.641667},
  {id:2,name:"La Poza del Obispo",lat:18.481694,lng:-66.696831},
  {id:3,name:"Luichy’s Seaside Hotel (El Combate)",lat:17.97741,lng:-67.21098},
  {id:4,name:"Faro Punta Higueras",lat:18.362028,lng:-67.270972},
  {id:5,name:"Buyé Beach",lat:18.048611,lng:-67.198611},
  {id:6,name:"Ferry to Culebra & Vieques",lat:18.22806,lng:-65.61972},
  {id:7,name:"Cueva de las Golondrinas",lat:18.477952,lng:-66.509275},
  {id:8,name:"Ceiba Ferry Terminal",lat:18.22806,lng:-65.61972},
  {id:9,name:"Playa Sucia",lat:17.936172,lng:-67.188252},
  {id:10,name:"Mirador Salinas de Cabo Rojo",lat:17.95675,lng:-67.19913},
  {id:11,name:"Playa Escalera (Steps)",lat:18.35,lng:-67.264},
  {id:12,name:"Punta Borinquen Resort",lat:18.502624,lng:-67.140555},
  {id:13,name:"Crash Boat Beach",lat:18.458392,lng:-67.164863},
  {id:14,name:"Playa Las Golondrinas",lat:18.5141,lng:-67.0566},
  {id:15,name:"Pozo de Jacinto",lat:18.515,lng:-67.073877},
  {id:16,name:"Mar Chiquita Beach",lat:18.47205,lng:-66.48193},
  {id:17,name:"SJU Airport",lat:18.43917,lng:-66.00194}
];

const DAY = {
  may30:{
    label:"May 30",
    subtitle:"Arrival → Overnight #1 (Punta Borinquen)",
    order:[17,16,7,1,2,15,14,13,12]
  },
  may31:{
    label:"May 31",
    subtitle:"West Coast → Sunset → Overnight #2 (El Combate)",
    order:[12,11,4,5,9,10,3]
  },
  jun1:{
    label:"Jun 1",
    subtitle:"Direct to ferry (no backtracking)",
    order:[3,8,6]
  }
};

/* ---------- MAP ---------- */

const map = L.map("map",{center:[18.2,-66.45],zoom:9});
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(map);

const stopById = new Map(STOPS.map(s=>[s.id,s]));
const markers = new Map();
let activeDay="may30";

function stepNum(id){
  const i = DAY[activeDay].order.indexOf(id);
  return i>=0 ? i+1 : "";
}

function icon(id){
  return L.divIcon({
    html:`<div class="mk">${stepNum(id)}</div>`,
    iconSize:[36,36],iconAnchor:[18,18]
  });
}

STOPS.forEach(s=>{
  const m = L.marker([s.lat,s.lng]).addTo(map);
  markers.set(s.id,m);
});

function applyDay(){
  DAY[activeDay].order.forEach(id=>{
    const m = markers.get(id);
    m.addTo(map);
    m.setIcon(icon(id));
  });
  markers.forEach((m,id)=>{
    if(!DAY[activeDay].order.includes(id)) map.removeLayer(m);
  });
  renderList();
}

function renderList(){
  const list=document.getElementById("list");
  list.innerHTML="";
  DAY[activeDay].order.forEach(id=>{
    const s=stopById.get(id);
    const row=document.createElement("div");
    row.className="item";
    row.innerHTML=`<div class="num">${stepNum(id)}</div><div>${s.name}</div>`;
    list.appendChild(row);
  });
}

const tabs=document.getElementById("dayTabs");
Object.keys(DAY).forEach(k=>{
  const b=document.createElement("button");
  b.className="day-btn"+(k===activeDay?" on":"");
  b.textContent=DAY[k].label;
  b.onclick=()=>{activeDay=k;tabs.querySelectorAll(".day-btn").forEach(x=>x.classList.remove("on"));b.classList.add("on");applyDay();};
  tabs.appendChild(b);
});

applyDay();
</script>
</body>
</html>
