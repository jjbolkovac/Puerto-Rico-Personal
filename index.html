<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Vieques — Trip Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--sun:#FFD93D;--coral:#FF6B6B;--ocean:#0096C7;--ink:#102028;--muted:#5c7680;--home:#9B59B6}
*{box-sizing:border-box} html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto}
#wrap{display:grid;grid-template-columns:390px 1fr;height:100%}
#sidebar{background:#fff;border-right:4px solid var(--sun);overflow:auto}
#map{height:100%}
header{padding:14px 16px 10px;border-bottom:1px solid #eee}
header h1{margin:0;font-size:18px}
header p{margin:6px 0 0;color:var(--muted);font-size:12px;font-weight:700;line-height:1.35}
.tabs{display:flex;gap:6px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid #eee;background:#fff;position:sticky;top:0;z-index:5}
.tab-btn{font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:7px 10px;border-radius:999px;border:2px solid #e6e6e6;background:#fff;color:#567;cursor:pointer}
.tab-btn.on{border-color:var(--ink);background:var(--ink);color:#fff}
.list{padding:10px}
.item{display:flex;gap:10px;border:1px solid #eee;border-radius:12px;padding:10px;margin-bottom:8px;cursor:pointer}
.item.selected{outline:3px solid rgba(0,0,0,.08)}
.num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;background:#0096C7}
#detail{position:fixed;top:0;right:0;width:410px;height:100%;background:#fff;transform:translateX(100%);transition:.35s;z-index:999;overflow:auto}
#detail.open{transform:translateX(0)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.2s;z-index:850}
#overlay.show{opacity:1;pointer-events:auto}
.mobile-fab{position:fixed;bottom:16px;left:16px;z-index:1001;padding:12px 16px;border-radius:999px;border:none;background:var(--ink);color:#fff;font-weight:900}
.mobile-fab.alt{left:auto;right:16px}
@media (max-width:820px){#wrap{grid-template-columns:1fr}#map{height:100svh}#sidebar,#detail{position:fixed;left:0;right:0;bottom:0;top:auto;height:62svh;transform:translateY(100%);border-radius:16px 16px 0 0}#sidebar.open,#detail.open{transform:translateY(0)}}
</style>
</head>
<body>
<div id="overlay"></div>
<div id="wrap">
  <div id="sidebar">
    <header><h1>Vieques — Island Tour</h1><p>Tap a marker or list item to open details.</p></header>
    <div class="tabs" id="tabs"></div>
    <div class="list" id="list"></div>
  </div>
  <div id="map"></div>
</div>
<div id="detail"><div style="padding:16px;font-weight:900" id="detail-content"></div></div>
<button id="fabStops" class="mobile-fab">📍 Stops</button>
<button id="fabFull" class="mobile-fab alt">🔎 Full map</button>
<script>
const STOPS=[
{id:1,name:'Sun Bay',lat:18.1057,lng:-65.438},
{id:2,name:'Media Luna Beach',lat:18.1048,lng:-65.4313},
{id:3,name:'Navio Beach',lat:18.1038,lng:-65.4246},
{id:4,name:'Bioluminescent Bay',lat:18.1258,lng:-65.4648},
{id:5,name:'Isabel Segunda',lat:18.1527,lng:-65.444},
{id:6,name:'Esperanza Malecón',lat:18.0946,lng:-65.4714}
];

const map=L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap contributors'}).addTo(map);

const markers=new Map();
STOPS.forEach(s=>{const m=L.marker([s.lat,s.lng]).addTo(map);markers.set(s.id,m);m.on('click',()=>openDetail(s));});
const allBounds=L.latLngBounds(STOPS.map(s=>[s.lat,s.lng]));
map.fitBounds(allBounds.pad(.15));

const detail=document.getElementById('detail');
const overlay=document.getElementById('overlay');
let selected=null;

function isMobile(){return window.matchMedia('(max-width:820px)').matches}
function bottomCover(){return detail.classList.contains('open')?detail.getBoundingClientRect().height:0}

function focusSelected(){if(!selected)return;map.fitBounds([[selected.lat,selected.lng]],{paddingBottomRight:[0,isMobile()?bottomCover():0],maxZoom:14,animate:true});}

function openDetail(s){selected=s;detail.classList.add('open');overlay.classList.add('show');document.getElementById('detail-content').textContent=s.name;setTimeout(focusSelected,320)}

function zoomFull(){selected=null;detail.classList.remove('open');overlay.classList.remove('show');map.fitBounds(allBounds.pad(.16))}

overlay.onclick=()=>{detail.classList.remove('open');overlay.classList.remove('show');setTimeout(focusSelected,320)}
document.getElementById('fabFull').onclick=zoomFull;
</script>
</body>
</html>
